<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>반려숨탄 — 일지</title>
  <style>
    :root {
      --cream-bg:#FFFDF7; --primary-50:#ECFDF5; --primary-100:#D1FAE5;
      --primary-200:#A7F3D0; --primary-300:#6EE7B7; --primary-400:#34D399;
      --primary-500:#10B981; --primary-600:#059669; --primary-900:#064E3B;
      --gray-100:#F3F4F6; --gray-200:#E5E7EB; --gray-300:#D1D5DB;
      --gray-400:#9CA3AF; --gray-500:#6B7280; --gray-600:#4B5563;
      --gray-700:#374151; --gray-900:#111827; --white:#FFFFFF;
      --cat-meal:#FEF3C7;     --cat-meal-dot:#F59E0B;
      --cat-walk:#DBEAFE;     --cat-walk-dot:#3B82F6;
      --cat-health:#FCE7F3;   --cat-health-dot:#EC4899;
      --cat-weight:#D1FAE5;   --cat-weight-dot:#10B981;
      --cat-hospital:#FEE2E2; --cat-hospital-dot:#EF4444;
      --cat-memo:#F3F4F6;     --cat-memo-dot:#6B7280;
      --radius-sm:6px; --radius-md:12px; --radius-lg:16px;
      --radius-xl:24px; --radius-full:9999px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    body{
      background:#c8c8c8;
      display:flex;justify-content:center;align-items:center;
      min-height:100vh;
      font-family:-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    }

    /* ── 폰 프레임 ── */
    .phone{
      width:390px; height:844px;
      background:var(--cream-bg);
      border-radius:48px;
      box-shadow:0 32px 80px rgba(0,0,0,.35),0 0 0 10px #1a1a1a,0 0 0 12px #333;
      overflow:hidden;
      display:flex; flex-direction:column;
      position:relative;
    }

    /* ── 상태바 ── */
    .status-bar{
      background:var(--primary-50); height:44px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 24px; flex-shrink:0;
    }
    .status-bar .time{font-size:15px;font-weight:600;color:var(--primary-900);}
    .status-bar .icons{display:flex;gap:6px;align-items:center;font-size:12px;color:var(--primary-900);}

    /* ── 헤더 ── */
    .app-header{
      background:var(--primary-50); height:56px;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 20px; border-bottom:1px solid var(--primary-100);
      flex-shrink:0; position:relative;
    }
    .header-title{font-size:18px;font-weight:700;color:var(--primary-900);}
    .pet-chip{
      position:absolute; left:50%; transform:translateX(-50%);
      background:var(--primary-100); border:1.5px solid var(--primary-400);
      border-radius:var(--radius-full); padding:4px 14px;
      font-size:12px; font-weight:600; color:var(--primary-900);
      display:flex; align-items:center; gap:4px; cursor:pointer;
    }
    .header-icon-btn{
      width:36px; height:36px; border-radius:var(--radius-full);
      background:transparent; border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:20px; color:var(--primary-900);
    }

    /* ══════════════════════════════════════
       핵심 레이아웃:
       캘린더(고정) + 이벤트리스트(독립 스크롤)
    ══════════════════════════════════════ */

    /* 캘린더 — flex-shrink:0 으로 높이 고정 */
    .calendar-wrap{
      background:var(--white);
      padding:14px 14px 10px;
      border-bottom:1px solid var(--gray-200);
      flex-shrink:0; /* ← 절대 줄어들지 않음 */
    }

    /* 이벤트 리스트 — 남은 공간 채우고 독립 스크롤 */
    .event-scroll{
      flex:1;          /* ← 남은 높이 전부 차지 */
      overflow-y:auto; /* ← 이 영역만 스크롤 */
      padding:14px 16px 80px;
    }
    .event-scroll::-webkit-scrollbar{display:none;}

    /* ── 캘린더 내부 ── */
    .cal-month-header{
      display:flex; align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .cal-month-arrow{
      width:30px; height:30px; border-radius:var(--radius-full);
      background:var(--primary-50); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:14px; color:var(--primary-600); font-weight:700;
    }
    .cal-month-title{font-size:16px;font-weight:700;color:var(--primary-900);}

    .cal-dow{
      display:grid; grid-template-columns:repeat(7,1fr);
      margin-bottom:2px;
    }
    .cal-dow span{
      text-align:center; font-size:10px; font-weight:600;
      color:var(--gray-400); padding:2px 0;
    }
    .cal-dow span:first-child{color:#EF4444;}
    .cal-dow span:last-child{color:#3B82F6;}

    .cal-grid{display:grid; grid-template-columns:repeat(7,1fr); gap:1px;}

    .cal-cell{
      display:flex; flex-direction:column; align-items:center;
      padding:3px 1px 4px; cursor:pointer;
      border-radius:var(--radius-md); transition:background .12s;
      min-height:48px;
    }
    .cal-cell:hover{background:var(--primary-50);}
    .cal-cell.other-month{cursor:default;}
    .cal-cell.other-month:hover{background:transparent;}

    .cal-day-num{
      font-size:12px; font-weight:500; color:var(--gray-700);
      width:26px; height:26px; border-radius:var(--radius-full);
      display:flex; align-items:center; justify-content:center; flex-shrink:0;
    }
    .cal-cell.today .cal-day-num{background:var(--primary-400);color:var(--white);font-weight:700;}
    .cal-cell.selected:not(.today) .cal-day-num{background:var(--primary-900);color:var(--white);font-weight:700;}
    .cal-cell.sunday .cal-day-num{color:#EF4444;}
    .cal-cell.saturday .cal-day-num{color:#3B82F6;}
    .cal-cell.today .cal-day-num,
    .cal-cell.selected .cal-day-num{color:var(--white)!important;}
    .cal-cell.other-month .cal-day-num{color:var(--gray-300);}

    /* 도트 — flex-wrap 으로 모두 표시 */
    .cal-dots{
      display:flex; gap:2px; flex-wrap:wrap;
      justify-content:center; max-width:30px;
      margin-top:2px; row-gap:2px;
    }
    .cal-dot{width:4px;height:4px;border-radius:var(--radius-full);flex-shrink:0;}

    /* ── 이벤트 리스트 내부 ── */
    .event-section-title{
      font-size:13px; font-weight:700; color:var(--gray-500);
      margin-bottom:10px;
    }
    .event-day-group{margin-bottom:16px;}
    .event-day-label{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
    .day-num-badge{
      width:28px; height:28px; border-radius:var(--radius-full);
      background:var(--primary-100);
      display:flex; align-items:center; justify-content:center;
      font-size:12px; font-weight:700; color:var(--primary-900); flex-shrink:0;
    }
    .day-num-badge.today-num{background:var(--primary-400);color:var(--white);}
    .day-num-badge.selected-num{background:var(--primary-900);color:var(--white);}
    .day-text{font-size:12px;color:var(--gray-500);font-weight:500;}

    .event-cards{display:flex;flex-direction:column;gap:8px;}
    .event-card{
      background:var(--white); border-radius:var(--radius-lg);
      padding:12px 14px; box-shadow:0 1px 4px rgba(0,0,0,.06);
      cursor:pointer; display:flex; gap:10px; align-items:flex-start;
      transition:transform .1s;
    }
    .event-card:active{transform:scale(.98);}
    .event-card-icon{
      width:38px; height:38px; border-radius:var(--radius-md);
      display:flex; align-items:center; justify-content:center;
      font-size:18px; flex-shrink:0;
    }
    .event-card-body{flex:1;min-width:0;}
    .event-card-title{font-size:14px;font-weight:700;color:var(--gray-900);margin-bottom:2px;}
    .event-card-desc{font-size:12px;color:var(--gray-500);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
    .event-card-time{font-size:11px;color:var(--gray-400);flex-shrink:0;margin-top:2px;}
    .media-strip{display:flex;gap:4px;margin-top:6px;}
    .media-thumb-sm{
      width:40px; height:40px; border-radius:var(--radius-sm);
      background:var(--gray-200); overflow:hidden; position:relative;
      flex-shrink:0; display:flex; align-items:center; justify-content:center; font-size:18px;
    }
    .media-thumb-sm .vbadge{
      position:absolute;bottom:2px;left:2px;
      background:rgba(0,0,0,.5);color:#fff;font-size:7px;border-radius:3px;padding:1px 3px;
    }

    /* ── FAB ── */
    .fab{
      position:absolute; bottom:76px; right:20px;
      width:52px; height:52px; border-radius:var(--radius-full);
      background:var(--primary-400);
      box-shadow:0 4px 16px rgba(16,185,129,.4);
      border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:26px; color:var(--white);
      transition:transform .15s; z-index:10;
    }
    .fab:active{transform:scale(.93);}

    /* ── 탭바 ── */
    .tab-bar{
      position:absolute; bottom:0; left:0; right:0; height:64px;
      background:var(--white); border-top:1px solid var(--gray-200);
      display:flex; align-items:center; justify-content:space-around;
      padding-bottom:4px; z-index:20;
    }
    .tab-item{display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;flex:1;}
    .tab-icon{font-size:22px;}
    .tab-label{font-size:10px;font-weight:500;color:var(--gray-400);}

    /* ══ 오버레이 공통 ══ */
    .overlay{
      position:absolute; inset:0; background:rgba(0,0,0,.45);
      z-index:50; display:none; align-items:flex-end;
    }
    .overlay.open{display:flex;}
    .sheet{
      width:100%; background:var(--white);
      border-radius:var(--radius-xl) var(--radius-xl) 0 0;
      max-height:90%; overflow-y:auto;
    }
    .sheet::-webkit-scrollbar{display:none;}
    .sheet-handle{
      width:36px; height:4px; background:var(--gray-300);
      border-radius:var(--radius-full); margin:12px auto 0;
    }
    .sheet-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:14px 20px 12px; border-bottom:1px solid var(--gray-100);
    }
    .sheet-title{font-size:16px;font-weight:700;color:var(--gray-900);}
    .sheet-close{
      width:28px; height:28px; border-radius:var(--radius-full);
      background:var(--gray-100); border:none; cursor:pointer;
      display:flex; align-items:center; justify-content:center;
      font-size:13px; color:var(--gray-500);
    }

    /* ══ STEP1 카테고리 선택 ══ */
    .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:16px 20px;}
    .cat-btn{
      display:flex; flex-direction:column; align-items:center; gap:6px;
      background:var(--gray-100); border:2px solid transparent;
      border-radius:var(--radius-lg); padding:14px 8px;
      cursor:pointer; transition:all .15s;
    }
    .cat-btn:hover,.cat-btn.sel{border-color:var(--primary-400);background:var(--primary-50);}
    .cat-btn .cat-ico{font-size:26px;}
    .cat-btn .cat-name{font-size:12px;font-weight:600;color:var(--gray-700);}
    .cat-btn.sel .cat-name{color:var(--primary-600);}
    .next-btn{
      margin:0 20px 20px; width:calc(100% - 40px);
      background:var(--primary-400); color:var(--white);
      border:none; border-radius:var(--radius-xl);
      padding:14px; font-size:15px; font-weight:700; cursor:pointer;
      transition:opacity .15s; display:block;
    }
    .next-btn:disabled{opacity:.4;cursor:default;}

    /* ══ STEP2 입력 폼 ══ */
    #sheet-form{display:none;}
    .form-body{padding:14px 20px 20px;}
    .form-row{margin-bottom:13px;}
    .form-label{font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:5px;display:block;}
    .form-input{
      width:100%; border:1.5px solid var(--gray-200);
      border-radius:var(--radius-md); padding:10px 12px;
      font-size:14px; color:var(--gray-900); background:var(--white);
      outline:none; font-family:inherit; transition:border-color .15s;
    }
    .form-input:focus{border-color:var(--primary-400);}
    textarea.form-input{resize:none;height:72px;line-height:1.5;}
    .time-row{display:flex;gap:8px;}
    .time-row .form-input{flex:1;}
    .unit-row{display:flex;gap:8px;align-items:center;}
    .unit-row .form-input{flex:1;}
    .unit-label{font-size:13px;font-weight:600;color:var(--gray-500);white-space:nowrap;}

    /* 미디어 첨부 */
    .media-attach-area{border:2px dashed var(--gray-300);border-radius:var(--radius-lg);padding:12px;}
    .media-attach-label{font-size:12px;font-weight:600;color:var(--gray-500);margin-bottom:8px;display:block;}
    .media-attach-btns{display:flex;gap:8px;margin-bottom:8px;}
    .media-attach-btn{
      flex:1; display:flex; flex-direction:column; align-items:center; gap:4px;
      background:var(--primary-50); border:1.5px solid var(--primary-200);
      border-radius:var(--radius-md); padding:9px 6px; cursor:pointer;
    }
    .media-attach-btn:hover{background:var(--primary-100);}
    .media-attach-btn .m-ico{font-size:20px;}
    .media-attach-btn .m-txt{font-size:10px;font-weight:600;color:var(--primary-600);}
    .attached-preview{display:flex;gap:6px;flex-wrap:wrap;}
    .attached-item{
      width:56px; height:56px; border-radius:var(--radius-md);
      background:linear-gradient(135deg,#a7f3d0,#6ee7b7);
      position:relative; overflow:hidden;
      display:flex; align-items:center; justify-content:center; font-size:22px;
    }
    .attached-item .remove-btn{
      position:absolute; top:2px; right:2px;
      width:15px; height:15px; border-radius:var(--radius-full);
      background:rgba(0,0,0,.6); color:#fff;
      font-size:8px; display:flex; align-items:center; justify-content:center;
      cursor:pointer; border:none;
    }
    .attached-item .vbadge-sm{
      position:absolute; bottom:2px; left:2px;
      background:rgba(0,0,0,.55); color:#fff; font-size:7px; border-radius:3px; padding:1px 3px;
    }
    .form-save-btn{
      width:100%; background:var(--primary-400); color:var(--white);
      border:none; border-radius:var(--radius-xl);
      padding:14px; font-size:15px; font-weight:700; cursor:pointer; margin-top:4px;
    }

    /* ══ 상세 시트 ══ */
    #sheet-detail{display:none;}
    .detail-hero{
      width:100%; height:140px;
      display:flex; align-items:center; justify-content:center; font-size:56px;
      border-radius:var(--radius-xl) var(--radius-xl) 0 0; overflow:hidden;
    }
    .detail-body{padding:14px 20px 0;}
    .detail-cat-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;}
    .detail-cat-icon{width:40px;height:40px;border-radius:var(--radius-md);display:flex;align-items:center;justify-content:center;font-size:20px;}
    .detail-title{font-size:17px;font-weight:700;color:var(--gray-900);}
    .detail-time{font-size:12px;color:var(--gray-400);margin-top:2px;}
    .detail-desc{font-size:14px;color:var(--gray-700);line-height:1.65;margin-bottom:12px;}
    .detail-fields{
      background:var(--gray-100); border-radius:var(--radius-lg);
      padding:12px 14px; margin-bottom:12px; display:flex; flex-direction:column; gap:8px;
    }
    .detail-field-row{display:flex;justify-content:space-between;align-items:center;}
    .detail-field-key{font-size:12px;color:var(--gray-500);font-weight:500;}
    .detail-field-val{font-size:13px;color:var(--gray-900);font-weight:600;}
    .detail-media-title{font-size:12px;font-weight:700;color:var(--gray-500);margin-bottom:8px;}
    .detail-media-grid{
      display:grid; grid-template-columns:repeat(3,1fr); gap:4px;
      border-radius:var(--radius-md); overflow:hidden; margin-bottom:14px;
    }
    .detail-media-item{
      aspect-ratio:1/1; background:linear-gradient(135deg,#a7f3d0,#6ee7b7);
      display:flex; align-items:center; justify-content:center; font-size:28px;
      cursor:pointer; position:relative;
    }
    .detail-media-item .play-overlay{
      position:absolute; inset:0; background:rgba(0,0,0,.28);
      display:flex; align-items:center; justify-content:center; font-size:24px;
    }
    .detail-action-row{display:flex;gap:8px;padding:0 20px 12px;}
    .detail-edit-btn{
      flex:1; background:var(--primary-50); border:1.5px solid var(--primary-400);
      border-radius:var(--radius-xl); padding:12px;
      font-size:14px; font-weight:700; color:var(--primary-600); cursor:pointer;
    }
    .detail-del-btn{
      flex:1; background:#FEF2F2; border:1.5px solid #FCA5A5;
      border-radius:var(--radius-xl); padding:12px;
      font-size:14px; font-weight:700; color:#EF4444; cursor:pointer;
    }
    .detail-close-btn{
      display:block; width:calc(100% - 40px); margin:0 20px 24px;
      background:var(--gray-100); border:none;
      border-radius:var(--radius-xl); padding:12px;
      font-size:14px; font-weight:600; color:var(--gray-600); cursor:pointer;
    }

    /* 삭제 확인 */
    .confirm-box{
      position:absolute; inset:0; background:rgba(0,0,0,.5);
      z-index:60; display:none; align-items:center; justify-content:center;
    }
    .confirm-box.open{display:flex;}
    .confirm-card{
      background:var(--white); border-radius:var(--radius-xl);
      padding:24px 20px; width:300px; text-align:center;
    }
    .confirm-title{font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:8px;}
    .confirm-desc{font-size:13px;color:var(--gray-500);margin-bottom:20px;line-height:1.5;}
    .confirm-btns{display:flex;gap:8px;}
    .confirm-cancel{
      flex:1; background:var(--gray-100); border:none; border-radius:var(--radius-xl);
      padding:12px; font-size:14px; font-weight:600; color:var(--gray-600); cursor:pointer;
    }
    .confirm-ok{
      flex:1; background:#EF4444; border:none; border-radius:var(--radius-xl);
      padding:12px; font-size:14px; font-weight:700; color:#fff; cursor:pointer;
    }
  </style>
</head>
<body>
<div class="phone">

  <!-- 상태바 -->
  <div class="status-bar">
    <span class="time">9:41</span>
    <div class="icons"><span>●●●</span><span>WiFi</span><span>🔋</span></div>
  </div>

  <!-- 헤더 -->
  <div class="app-header">
    <span class="header-title">일지</span>
    <div class="pet-chip">🐶 콩이 ▾</div>
    <button class="header-icon-btn">☰</button>
  </div>

  <!-- ★ 캘린더 고정 영역 (flex-shrink:0) -->
  <div class="calendar-wrap">
    <div class="cal-month-header">
      <button class="cal-month-arrow" onclick="changeMonth(-1)">‹</button>
      <span class="cal-month-title" id="cal-title"></span>
      <button class="cal-month-arrow" onclick="changeMonth(1)">›</button>
    </div>
    <div class="cal-dow">
      <span>일</span><span>월</span><span>화</span><span>수</span>
      <span>목</span><span>금</span><span>토</span>
    </div>
    <div class="cal-grid" id="cal-grid"></div>
  </div>

  <!-- ★ 이벤트 리스트 독립 스크롤 영역 (flex:1 + overflow-y:auto) -->
  <div class="event-scroll" id="event-scroll">
    <div class="event-section-title" id="event-section-title"></div>
    <div id="event-list"></div>
  </div>

  <!-- FAB -->
  <button class="fab" onclick="openSelectSheet()">＋</button>

  <!-- 탭바 -->
  <div class="tab-bar">
    <div class="tab-item"><span class="tab-icon">🏠</span><span class="tab-label">홈</span></div>
    <div class="tab-item"><span class="tab-icon">📔</span><span class="tab-label" style="color:var(--primary-500)">일지</span></div>
    <div class="tab-item"><span class="tab-icon">📅</span><span class="tab-label">캘린더</span></div>
    <div class="tab-item"><span class="tab-icon">📊</span><span class="tab-label">통계</span></div>
    <div class="tab-item"><span class="tab-icon">⚙️</span><span class="tab-label">설정</span></div>
  </div>

  <!-- OVERLAY 1: 카테고리 선택 -->
  <div class="overlay" id="overlay-select" onclick="bgClose(event,'overlay-select')">
    <div class="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <span class="sheet-title">어떤 기록을 추가할까요?</span>
        <button class="sheet-close" onclick="closeAll()">✕</button>
      </div>
      <div class="cat-grid">
        <div class="cat-btn" data-cat="meal"     onclick="selectCat(this)"><span class="cat-ico">🍚</span><span class="cat-name">식사</span></div>
        <div class="cat-btn" data-cat="walk"     onclick="selectCat(this)"><span class="cat-ico">🚶</span><span class="cat-name">산책</span></div>
        <div class="cat-btn" data-cat="health"   onclick="selectCat(this)"><span class="cat-ico">💊</span><span class="cat-name">투약</span></div>
        <div class="cat-btn" data-cat="hospital" onclick="selectCat(this)"><span class="cat-ico">🏥</span><span class="cat-name">병원</span></div>
        <div class="cat-btn" data-cat="weight"   onclick="selectCat(this)"><span class="cat-ico">⚖️</span><span class="cat-name">체중</span></div>
        <div class="cat-btn" data-cat="memo"     onclick="selectCat(this)"><span class="cat-ico">📝</span><span class="cat-name">메모</span></div>
      </div>
      <button class="next-btn" id="next-btn" disabled onclick="openFormSheet()">다음 →</button>
    </div>
  </div>

  <!-- OVERLAY 2: 입력 폼 -->
  <div class="overlay" id="overlay-form" onclick="bgClose(event,'overlay-form')">
    <div class="sheet" id="sheet-form">
      <div class="sheet-handle"></div>
      <div class="sheet-header">
        <div style="display:flex;align-items:center;gap:8px;">
          <button class="sheet-close" onclick="backToSelect()" style="background:var(--primary-50);color:var(--primary-600);">‹</button>
          <span class="sheet-title" id="form-sheet-title"></span>
        </div>
        <button class="sheet-close" onclick="closeAll()">✕</button>
      </div>
      <div class="form-body" id="form-body"></div>
    </div>
  </div>

  <!-- OVERLAY 3: 상세 -->
  <div class="overlay" id="overlay-detail" onclick="bgClose(event,'overlay-detail')">
    <div class="sheet" id="sheet-detail">
      <div class="sheet-handle"></div>
      <div id="detail-content"></div>
      <div class="detail-action-row">
        <button class="detail-edit-btn" onclick="editEvent()">✏️ 수정</button>
        <button class="detail-del-btn"  onclick="confirmDelete()">🗑️ 삭제</button>
      </div>
      <button class="detail-close-btn" onclick="closeAll()">닫기</button>
    </div>
  </div>

  <!-- 삭제 확인 -->
  <div class="confirm-box" id="confirm-box">
    <div class="confirm-card">
      <div class="confirm-title">기록을 삭제할까요?</div>
      <div class="confirm-desc">삭제된 기록은 복구할 수 없어요.</div>
      <div class="confirm-btns">
        <button class="confirm-cancel" onclick="closeConfirm()">취소</button>
        <button class="confirm-ok"     onclick="doDelete()">삭제</button>
      </div>
    </div>
  </div>

</div><!-- /phone -->

<script>
/* ═══════════════════════
   상수 & 데이터
═══════════════════════ */
const CAT = {
  meal:     { icon:'🍚', label:'식사',   bg:'var(--cat-meal)',     dot:'#F59E0B', heroGrad:'#FEF3C7,#FDE68A' },
  walk:     { icon:'🚶', label:'산책',   bg:'var(--cat-walk)',     dot:'#3B82F6', heroGrad:'#DBEAFE,#BFDBFE' },
  health:   { icon:'💊', label:'투약',   bg:'var(--cat-health)',   dot:'#EC4899', heroGrad:'#FCE7F3,#FBCFE8' },
  hospital: { icon:'🏥', label:'병원',   bg:'var(--cat-hospital)', dot:'#EF4444', heroGrad:'#FEE2E2,#FECACA' },
  weight:   { icon:'⚖️', label:'체중',   bg:'var(--cat-weight)',   dot:'#10B981', heroGrad:'#D1FAE5,#A7F3D0' },
  memo:     { icon:'📝', label:'메모',   bg:'var(--cat-memo)',     dot:'#6B7280', heroGrad:'#F3F4F6,#E5E7EB' },
};

const CAT_FIELDS = {
  meal: [
    { id:'f_amount', label:'급여량',      type:'text',   placeholder:'예) 80g',                  unit:'' },
    { id:'f_water',  label:'음수량',      type:'text',   placeholder:'예) 150ml',                unit:'' },
    { id:'f_brand',  label:'사료 브랜드', type:'text',   placeholder:'예) 로얄캐닌 미디엄 어덜트', unit:'' },
  ],
  walk: [
    { id:'f_duration', label:'산책 시간', type:'number', placeholder:'35',        unit:'분' },
    { id:'f_distance', label:'거리',      type:'number', placeholder:'2.1',       unit:'km' },
    { id:'f_place',    label:'장소',      type:'text',   placeholder:'예) 한강공원', unit:'' },
  ],
  health: [
    { id:'f_drug', label:'약품명',      type:'text', placeholder:'예) 넥스가드 스펙트라 M', unit:'' },
    { id:'f_dose', label:'용량',        type:'text', placeholder:'예) 1정',                unit:'' },
    { id:'f_next', label:'다음 투약일', type:'date', placeholder:'',                        unit:'' },
  ],
  hospital: [
    { id:'f_hospital', label:'병원명',    type:'text',   placeholder:'예) 서울동물병원', unit:'' },
    { id:'f_reason',   label:'방문 사유', type:'text',   placeholder:'예) 정기 검진',   unit:'' },
    { id:'f_cost',     label:'진료비',    type:'number', placeholder:'예) 50000',       unit:'원' },
  ],
  weight: [
    { id:'f_weight', label:'체중',      type:'number', placeholder:'8.4', unit:'kg' },
    { id:'f_prev',   label:'이전 체중', type:'number', placeholder:'8.5', unit:'kg' },
  ],
  memo: [],
};

let events = [
  { id:1,  cat:'meal',     date:'2026-05-02', time:'08:30', title:'아침 식사',         desc:'로얄캐닌 미디엄 어덜트 80g · 물 150ml', media:['🍚'],      fields:{f_amount:'80g',f_water:'150ml',f_brand:'로얄캐닌 미디엄 어덜트'} },
  { id:2,  cat:'walk',     date:'2026-05-02', time:'10:15', title:'오전 산책',         desc:'한강공원 · 35분 · 2.1km',               media:['🌿','🐾▶'],fields:{f_duration:'35',f_distance:'2.1',f_place:'한강공원'} },
  { id:3,  cat:'health',   date:'2026-05-02', time:'13:00', title:'심장사상충 예방약', desc:'넥스가드 스펙트라 M · 1정',             media:[],          fields:{f_drug:'넥스가드 스펙트라 M',f_dose:'1정',f_next:'2026-06-02'} },
  { id:4,  cat:'memo',     date:'2026-05-02', time:'15:40', title:'메모',              desc:'오늘따라 물을 많이 마심. 내일 체크.',   media:[],          fields:{} },
  { id:5,  cat:'meal',     date:'2026-05-01', time:'08:00', title:'아침 식사',         desc:'로얄캐닌 80g',                           media:[],          fields:{f_amount:'80g'} },
  { id:6,  cat:'walk',     date:'2026-05-01', time:'09:30', title:'아침 산책',         desc:'동네 한 바퀴 · 20분',                   media:['🌸'],      fields:{f_duration:'20',f_place:'동네'} },
  { id:7,  cat:'weight',   date:'2026-05-01', time:'11:00', title:'체중 측정',         desc:'8.4kg',                                 media:[],          fields:{f_weight:'8.4',f_prev:'8.5'} },
  { id:8,  cat:'meal',     date:'2026-05-03', time:'08:30', title:'아침 식사',         desc:'로얄캐닌 80g',                           media:[],          fields:{f_amount:'80g'} },
  { id:9,  cat:'hospital', date:'2026-05-05', time:'14:00', title:'정기 검진',         desc:'서울동물병원',                           media:[],          fields:{f_hospital:'서울동물병원',f_reason:'정기 검진'} },
  { id:10, cat:'meal',     date:'2026-04-30', time:'08:00', title:'아침 식사',         desc:'로얄캐닌 80g',                           media:[],          fields:{} },
  { id:11, cat:'walk',     date:'2026-05-02', time:'18:00', title:'저녁 산책',         desc:'공원 · 25분',                           media:[],          fields:{f_duration:'25',f_place:'공원'} },
  { id:12, cat:'health',   date:'2026-05-01', time:'20:00', title:'영양제',            desc:'오메가3 · 1캡슐',                       media:[],          fields:{f_drug:'오메가3',f_dose:'1캡슐'} },
];
let nextId=20, curYear=2026, curMonth=5;
let selectedDate='2026-05-02';
let selectedCat=null, attachedMedia=[], editingId=null, deletingId=null;

/* ═══════════════════════
   캘린더
═══════════════════════ */
function changeMonth(d){
  curMonth+=d;
  if(curMonth>12){curMonth=1;curYear++;}
  if(curMonth<1){curMonth=12;curYear--;}
  renderCalendar();
  renderEventList();
}

function renderCalendar(){
  document.getElementById('cal-title').textContent=`${curYear}년 ${curMonth}월`;
  const grid=document.getElementById('cal-grid');
  grid.innerHTML='';
  const firstDay=new Date(curYear,curMonth-1,1).getDay();
  const daysInMonth=new Date(curYear,curMonth,0).getDate();
  const prevDays=new Date(curYear,curMonth-1,0).getDate();
  const TODAY='2026-05-02';

  for(let i=0;i<firstDay;i++)
    grid.appendChild(makeCell(curYear,curMonth-1||12,prevDays-firstDay+1+i,true));
  for(let d=1;d<=daysInMonth;d++){
    const ds=`${curYear}-${pad(curMonth)}-${pad(d)}`;
    grid.appendChild(makeCell(curYear,curMonth,d,false,ds,TODAY));
  }
  const total=firstDay+daysInMonth;
  const remain=total%7===0?0:7-(total%7);
  for(let d=1;d<=remain;d++)
    grid.appendChild(makeCell(curYear,curMonth%12+1,d,true));
}

function pad(n){return String(n).padStart(2,'0');}

function makeCell(y,m,d,other,dateStr,today){
  const cell=document.createElement('div');
  cell.className='cal-cell';
  const dow=new Date(y,m-1,d).getDay();
  if(dow===0)cell.classList.add('sunday');
  if(dow===6)cell.classList.add('saturday');
  if(other)cell.classList.add('other-month');
  if(dateStr===today)cell.classList.add('today');
  if(dateStr===selectedDate&&!other)cell.classList.add('selected');

  const num=document.createElement('div');
  num.className='cal-day-num';
  num.textContent=d;
  cell.appendChild(num);

  if(dateStr&&!other){
    const dayEvs=events.filter(e=>e.date===dateStr);
    if(dayEvs.length){
      const dotsWrap=document.createElement('div');
      dotsWrap.className='cal-dots';
      const seen=new Set();
      dayEvs.forEach(e=>{
        if(seen.has(e.cat))return;
        seen.add(e.cat);
        const dot=document.createElement('div');
        dot.className='cal-dot';
        dot.style.background=CAT[e.cat].dot;
        dotsWrap.appendChild(dot);
      });
      cell.appendChild(dotsWrap);
    }
    cell.onclick=()=>selectDate(dateStr);
  }
  return cell;
}

function selectDate(ds){
  selectedDate=ds;
  renderCalendar();
  renderEventList();

  // ★ 이벤트 스크롤 영역(#event-scroll)에서만 해당 그룹으로 이동
  setTimeout(()=>{
    const scrollEl = document.getElementById('event-scroll');
    const target   = document.getElementById('group-'+ds);
    if(target && scrollEl){
      // target의 event-scroll 내부 상대 위치 계산
      const scrollTop = target.offsetTop - scrollEl.offsetTop - 8;
      scrollEl.scrollTo({ top: Math.max(0, scrollTop), behavior:'smooth' });
    } else if(scrollEl){
      // 해당 날짜 기록 없으면 맨 위로
      scrollEl.scrollTo({ top:0, behavior:'smooth' });
    }
  }, 50);
}

/* ═══════════════════════
   이벤트 리스트
═══════════════════════ */
function renderEventList(){
  const container=document.getElementById('event-list');
  const titleEl=document.getElementById('event-section-title');
  container.innerHTML='';

  const ms=`${curYear}-${pad(curMonth)}`;
  const monthEvs=events.filter(e=>e.date.startsWith(ms));
  titleEl.textContent=`${curMonth}월 기록 (${monthEvs.length}건)`;

  if(!monthEvs.length){
    container.innerHTML=`<div style="text-align:center;padding:32px 0;color:var(--gray-400);font-size:13px;">이번 달 기록이 없어요 🐾</div>`;
    return;
  }

  const groups={};
  monthEvs.forEach(e=>{if(!groups[e.date])groups[e.date]=[];groups[e.date].push(e);});
  const sortedDates=Object.keys(groups).sort((a,b)=>b.localeCompare(a));
  const TODAY='2026-05-02';
  const DOWS=['일','월','화','수','목','금','토'];

  sortedDates.forEach(date=>{
    const group=document.createElement('div');
    group.className='event-day-group';
    group.id='group-'+date; // ← 스크롤 타겟 ID

    const d=new Date(date+'T00:00:00');
    const label=document.createElement('div');
    label.className='event-day-label';

    const badge=document.createElement('div');
    const isToday=date===TODAY;
    const isSel=date===selectedDate&&!isToday;
    badge.className='day-num-badge'+(isToday?' today-num':'')+(isSel?' selected-num':'');
    badge.textContent=d.getDate();

    const txt=document.createElement('div');
    txt.className='day-text';
    txt.textContent=`${d.getMonth()+1}월 ${d.getDate()}일 (${DOWS[d.getDay()]})${isToday?' · 오늘':''}`;

    label.appendChild(badge);
    label.appendChild(txt);
    group.appendChild(label);

    const cards=document.createElement('div');
    cards.className='event-cards';
    groups[date].sort((a,b)=>a.time.localeCompare(b.time)).forEach(ev=>{
      cards.appendChild(makeEventCard(ev));
    });
    group.appendChild(cards);
    container.appendChild(group);
  });
}

function makeEventCard(ev){
  const c=CAT[ev.cat];
  const card=document.createElement('div');
  card.className='event-card';
  card.onclick=()=>openDetail(ev.id);
  let mediaHtml='';
  if(ev.media&&ev.media.length){
    const thumbs=ev.media.map(m=>{
      const isV=m.includes('▶');
      const ico=m.replace('▶','');
      return `<div class="media-thumb-sm" style="background:linear-gradient(135deg,#a7f3d0,#6ee7b7);">${ico}${isV?'<div class="vbadge">▶</div>':''}</div>`;
    }).join('');
    mediaHtml=`<div class="media-strip">${thumbs}</div>`;
  }
  card.innerHTML=`
    <div class="event-card-icon" style="background:${c.bg}">${c.icon}</div>
    <div class="event-card-body">
      <div class="event-card-title">${ev.title}</div>
      <div class="event-card-desc">${ev.desc}</div>
      ${mediaHtml}
    </div>
    <div class="event-card-time">${ev.time}</div>`;
  return card;
}

/* ═══════════════════════
   상세 보기
═══════════════════════ */
function openDetail(id){
  const ev=events.find(e=>e.id===id);
  if(!ev)return;
  deletingId=id;
  const c=CAT[ev.cat];
  const fieldDefs=CAT_FIELDS[ev.cat]||[];

  let fieldsHtml='';
  if(fieldDefs.length&&ev.fields){
    const rows=fieldDefs.filter(f=>ev.fields[f.id]).map(f=>`
      <div class="detail-field-row">
        <span class="detail-field-key">${f.label}</span>
        <span class="detail-field-val">${ev.fields[f.id]}${f.unit?' '+f.unit:''}</span>
      </div>`).join('');
    if(rows) fieldsHtml=`<div class="detail-fields">${rows}</div>`;
  }

  let mediaHtml='';
  if(ev.media&&ev.media.length){
    const items=ev.media.map(m=>{
      const isV=m.includes('▶');
      const ico=m.replace('▶','');
      return `<div class="detail-media-item">${ico}${isV?'<div class="play-overlay">▶️</div>':''}</div>`;
    }).join('');
    mediaHtml=`<div class="detail-media-title">📎 첨부 미디어</div><div class="detail-media-grid">${items}</div>`;
  }

  document.getElementById('detail-content').innerHTML=`
    <div class="detail-hero" style="background:linear-gradient(135deg,${c.heroGrad})">${c.icon}</div>
    <div class="detail-body">
      <div class="detail-cat-row">
        <div class="detail-cat-icon" style="background:${c.bg}">${c.icon}</div>
        <div>
          <div class="detail-title">${ev.title}</div>
          <div class="detail-time">${ev.date} · ${ev.time} · ${c.label}</div>
        </div>
      </div>
      ${ev.desc?`<div class="detail-desc">${ev.desc}</div>`:''}
      ${fieldsHtml}
      ${mediaHtml}
    </div>`;
  document.getElementById('sheet-detail').style.display='block';
  document.getElementById('overlay-detail').classList.add('open');
}

/* ═══════════════════════
   수정
═══════════════════════ */
function editEvent(){
  const ev=events.find(e=>e.id===deletingId);
  if(!ev)return;
  editingId=deletingId;
  selectedCat=ev.cat;
  closeAll();
  setTimeout(()=>openFormSheet(ev),100);
}

/* ═══════════════════════
   삭제
═══════════════════════ */
function confirmDelete(){ document.getElementById('confirm-box').classList.add('open'); }
function closeConfirm(){ document.getElementById('confirm-box').classList.remove('open'); }
function doDelete(){
  events=events.filter(e=>e.id!==deletingId);
  closeConfirm(); closeAll();
  renderCalendar(); renderEventList();
}

/* ═══════════════════════
   추가 / 수정 플로우
═══════════════════════ */
function openSelectSheet(){
  editingId=null; selectedCat=null; attachedMedia=[];
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
  document.getElementById('next-btn').disabled=true;
  document.getElementById('overlay-select').classList.add('open');
}

function selectCat(el){
  document.querySelectorAll('.cat-btn').forEach(b=>b.classList.remove('sel'));
  el.classList.add('sel');
  selectedCat=el.dataset.cat;
  document.getElementById('next-btn').disabled=false;
}

function openFormSheet(existingEv){
  if(!selectedCat)return;
  const c=CAT[selectedCat];
  document.getElementById('form-sheet-title').textContent=`${c.icon} ${c.label} ${editingId?'수정':'기록'}`;
  attachedMedia=existingEv&&existingEv.media?[...existingEv.media]:[];
  const defs=CAT_FIELDS[selectedCat]||[];
  const ev=existingEv||{};

  const extraFields=defs.map(f=>{
    const val=(ev.fields&&ev.fields[f.id])||'';
    if(f.unit) return `<div class="form-row"><label class="form-label">${f.label}</label><div class="unit-row"><input class="form-input" type="${f.type}" id="${f.id}" placeholder="${f.placeholder}" value="${val}"/><span class="unit-label">${f.unit}</span></div></div>`;
    return `<div class="form-row"><label class="form-label">${f.label}</label><input class="form-input" type="${f.type}" id="${f.id}" placeholder="${f.placeholder}" value="${val}"/></div>`;
  }).join('');

  document.getElementById('form-body').innerHTML=`
    <div class="form-row">
      <label class="form-label">날짜 · 시간</label>
      <div class="time-row">
        <input class="form-input" type="date" id="f-date" value="${ev.date||selectedDate||'2026-05-02'}"/>
        <input class="form-input" type="time" id="f-time" value="${ev.time||'09:00'}"/>
      </div>
    </div>
    <div class="form-row">
      <label class="form-label">제목</label>
      <input class="form-input" type="text" id="f-title" placeholder="제목을 입력하세요" value="${ev.title||''}"/>
    </div>
    ${extraFields}
    <div class="form-row">
      <label class="form-label">메모</label>
      <textarea class="form-input" id="f-memo" placeholder="추가 메모를 입력하세요…">${ev.desc||''}</textarea>
    </div>
    <div class="form-row">
      <div class="media-attach-area">
        <span class="media-attach-label">📎 사진 · 영상 첨부</span>
        <div class="media-attach-btns">
          <button class="media-attach-btn" onclick="addFakeMedia('photo')"><span class="m-ico">📷</span><span class="m-txt">사진 촬영</span></button>
          <button class="media-attach-btn" onclick="addFakeMedia('album')"><span class="m-ico">🖼️</span><span class="m-txt">앨범 선택</span></button>
          <button class="media-attach-btn" onclick="addFakeMedia('video')"><span class="m-ico">🎬</span><span class="m-txt">동영상</span></button>
        </div>
        <div class="attached-preview" id="attached-preview"></div>
      </div>
    </div>
    <button class="form-save-btn" onclick="saveEvent()">${editingId?'수정 완료':'저장하기'}</button>`;
  renderAttached();
  document.getElementById('overlay-select').classList.remove('open');
  document.getElementById('sheet-form').style.display='block';
  document.getElementById('overlay-form').classList.add('open');
}

function backToSelect(){
  document.getElementById('overlay-form').classList.remove('open');
  document.getElementById('sheet-form').style.display='none';
  if(!editingId) document.getElementById('overlay-select').classList.add('open');
}

const fakePool={photo:['📸','🐶','🌿','🌸','🦴'],album:['🖼️','🐾','🌈','🏞️','🌻'],video:['🎬▶','📹▶','🎥▶']};
let fakeIdx={photo:0,album:0,video:0};
function addFakeMedia(type){
  attachedMedia.push(fakePool[type][fakeIdx[type]%fakePool[type].length]);
  fakeIdx[type]++;
  renderAttached();
}
function removeMedia(i){ attachedMedia.splice(i,1); renderAttached(); }
function renderAttached(){
  const wrap=document.getElementById('attached-preview');
  if(!wrap)return;
  wrap.innerHTML='';
  attachedMedia.forEach((m,i)=>{
    const isV=m.includes('▶'); const ico=m.replace('▶','');
    const item=document.createElement('div');
    item.className='attached-item';
    item.innerHTML=`${ico}${isV?'<div class="vbadge-sm">▶</div>':''}<button class="remove-btn" onclick="removeMedia(${i})">✕</button>`;
    wrap.appendChild(item);
  });
}

function saveEvent(){
  const title=document.getElementById('f-title').value.trim();
  if(!title){alert('제목을 입력해주세요');return;}
  const defs=CAT_FIELDS[selectedCat]||[];
  const fields={};
  defs.forEach(f=>{const el=document.getElementById(f.id);if(el&&el.value.trim())fields[f.id]=el.value.trim();});
  const descParts=defs.filter(f=>fields[f.id]).map(f=>`${fields[f.id]}${f.unit?' '+f.unit:''}`);
  const memoVal=document.getElementById('f-memo').value.trim();
  const desc=descParts.length?descParts.join(' · '):(memoVal||CAT[selectedCat].label);

  if(editingId){
    const idx=events.findIndex(e=>e.id===editingId);
    if(idx>-1) events[idx]={...events[idx],cat:selectedCat,date:document.getElementById('f-date').value,time:document.getElementById('f-time').value,title,desc,fields,media:[...attachedMedia]};
  } else {
    events.push({id:nextId++,cat:selectedCat,date:document.getElementById('f-date').value,time:document.getElementById('f-time').value,title,desc,fields,media:[...attachedMedia]});
  }
  closeAll(); renderCalendar(); renderEventList();
}

function bgClose(e,id){if(e.target===document.getElementById(id))closeAll();}
function closeAll(){
  ['overlay-select','overlay-form','overlay-detail'].forEach(id=>document.getElementById(id).classList.remove('open'));
  document.getElementById('sheet-form').style.display='none';
  document.getElementById('sheet-detail').style.display='none';
  editingId=null;
}

renderCalendar();
renderEventList();
</script>
</body>
</html>
