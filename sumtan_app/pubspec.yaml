name: sumtan_app
description: 반려숨탄 — 반려동물 건강관리 앱
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  go_router: ^13.0.0

  flutter_riverpod: ^2.5.0

  sqflite: ^2.3.3
  sqflite_common: ^2.5.4
  sqflite_common_ffi: ^2.3.3
  sqflite_common_ffi_web: ^1.0.2

  path: ^1.9.0
  path_provider: ^2.1.0

  intl: ^0.20.2

  image_picker: ^1.1.0
  video_player: ^2.8.6
  permission_handler: ^11.3.1
  flutter_local_notifications: ^17.0.0
  timezone: ^0.9.0

  shared_preferences: ^2.2.0

  uuid: ^4.3.0

  url_launcher: ^6.3.0
  archive: ^3.6.1
  share_plus: ^10.0.0
  file_picker: ^8.0.0
  in_app_purchase: ^3.2.0
  flutter_secure_storage: ^9.0.0
  crypto: ^3.0.3
  freerasp: ^7.5.1

  cupertino_icons: ^1.0.8
  flutter_timezone: ^5.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1
  flutter_native_splash: ^2.4.0

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/icon/
    - assets/splash/

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true

  #image_path: "assets/icon/app_icon.png"   # 공통 아이콘 경로 (안드로이드 최신 버전과 iOS 모두에서 사용)
  image_path_android: "assets/icon/icon_1024.png" # 안드로이드 구버전(API 25 이하)용 레거시 아이콘
  image_path_ios: "assets/icon/icon_1024.png"   # iOS용 아이콘 (투명도 없이 배경이 꽉 채워진 이미지 사용)
  
  # 2. 안드로이드 최신 버전(API 26 이상)을 위한 Adaptive Icon 설정
  adaptive_icon_background: "assets/icon/bg_1024.png"              # 안드로이드 아이콘 배경색 (이미지 경로도 사용 가능)
  adaptive_icon_foreground: "assets/icon/logo_1024.png" # 안드로이드 아이콘 전경(투명 배경의 메인 로고)

  min_sdk_android: 21
  remove_alpha_ios: true
  android_notification_icon: 
    image_path: "assets/icon/icon_1024.png"

flutter_native_splash:
  color: "#30be77"
  fullscreen: true
  android_12:
    color: "#30be77"
